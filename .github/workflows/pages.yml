name: Render NEXRAD tiles to Pages

# Scheduling is handled externally (cron-job.org) via the workflow_dispatch
# REST endpoint, because GitHub's built-in `schedule:` cron is heavily throttled
# and unreliable. It runs on push and manual dispatch too.
on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

# This workflow deliberately uses NO `uses:` actions (no actions/checkout,
# setup-python, etc.) so it cannot be blocked by an org "Allowed actions"
# policy. Everything is done with plain shell on the runner, which already has
# git and python3 preinstalled.
jobs:
  render-and-deploy:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NEXRAD_OUT: _site
      NEXRAD_PRODUCT: bref_qcd
      NEXRAD_MIN_ZOOM: "0"
      NEXRAD_MAX_ZOOM: "8"
      NEXRAD_FRAMES: "6"
      NEXRAD_WINDOW_MIN: "60"
      NEXRAD_CONCURRENCY: "32"
    steps:
      - name: Render tiles and publish to gh-pages
        run: |
          set -euo pipefail
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          echo "::group::Clone source"
          git clone --depth 1 "$REPO_URL" src
          cd src
          echo "::endgroup::"

          echo "::group::Install deps"
          python3 -m pip install --quiet --upgrade pip
          python3 -m pip install --quiet httpx Pillow
          echo "::endgroup::"

          echo "::group::Render"
          python3 render_tiles.py
          echo "::endgroup::"

          echo "::group::Publish gh-pages"
          cd "$NEXRAD_OUT"
          touch .nojekyll
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy NEXRAD tiles $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push -f "$REPO_URL" gh-pages
          echo "Published to gh-pages."
          echo "::endgroup::"
