name: Render NEXRAD tiles to Pages

on:
  # Refresh on a schedule. Note: GitHub cron is best-effort and often delayed;
  # the practical fastest cadence is ~10-15 min.
  schedule:
    - cron: "*/15 * * * *"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:
  # Render on push so the site isn't empty before the first cron.
  push:
    branches: [main, master]

# Allow the built-in token to push the rendered output to the gh-pages branch.
permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  render-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install httpx Pillow

      - name: Render tiles
        env:
          NEXRAD_OUT: _site
          NEXRAD_PRODUCT: bref_qcd
          NEXRAD_MIN_ZOOM: "0"
          NEXRAD_MAX_ZOOM: "6"
          NEXRAD_FRAMES: "6"
          NEXRAD_WINDOW_MIN: "60"
          NEXRAD_CONCURRENCY: "16"
        run: python render_tiles.py

      - name: Publish to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          cd _site
          touch .nojekyll
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy NEXRAD tiles $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
          echo "Pushed rendered tiles to gh-pages branch."
