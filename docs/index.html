<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXRAD Radar &middot; USA / AK / HI (GitHub Pages)</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    :root { --panel-bg: rgba(17, 22, 30, 0.92); --accent: #4fc3f7; }
    html, body { height: 100%; margin: 0; }
    #map { position: absolute; inset: 0; background: #0b0e13; }
    * { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .panel {
      position: absolute; z-index: 1000; top: 12px; left: 12px;
      background: var(--panel-bg); color: #e6edf3; padding: 14px 16px;
      border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,.45);
      width: 250px; backdrop-filter: blur(6px);
    }
    .panel h1 { font-size: 15px; margin: 0 0 2px; }
    .panel .sub { font-size: 11px; color: #8b98a5; margin-bottom: 12px; }
    .row { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; font-size: 12px; }
    select, button {
      background: #1c2530; color: #e6edf3; border: 1px solid #2b3644;
      border-radius: 8px; padding: 6px 8px; font-size: 12px; cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    input[type=range] { accent-color: var(--accent); }
    .row input[type=range] { width: 120px; }
    .jump { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .jump button { flex: 1 1 auto; }
    .status { font-size: 11px; color: #8b98a5; margin-top: 10px; }
    .player {
      position: absolute; z-index: 1000; bottom: 18px; left: 50%; transform: translateX(-50%);
      background: var(--panel-bg); color: #e6edf3; padding: 10px 14px; border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,.45); display: flex; align-items: center; gap: 12px;
      backdrop-filter: blur(6px); width: min(680px, calc(100vw - 40px));
    }
    .player .play { font-size: 16px; width: 40px; height: 34px; }
    .player .time { font-variant-numeric: tabular-nums; font-size: 13px; min-width: 168px; }
    .player .time b { color: var(--accent); }
    .player .scrub { flex: 1 1 auto; }
    .player .live { font-size: 10px; text-transform: uppercase; letter-spacing: .5px;
      padding: 3px 6px; border-radius: 6px; border: 1px solid #2b3644; color: #8b98a5; }
    .player .live.on { color: #0b0e13; background: #4fc3f7; border-color: #4fc3f7; }
    .legend {
      position: absolute; z-index: 1000; bottom: 84px; right: 12px; background: var(--panel-bg);
      color: #e6edf3; padding: 10px 12px; border-radius: 10px; font-size: 11px;
      box-shadow: 0 8px 30px rgba(0,0,0,.45);
    }
    .legend .bar { height: 10px; width: 190px; border-radius: 3px; margin: 6px 0 3px;
      background: linear-gradient(to right, #04e9e7 0%, #019ff4 12%, #0300f4 20%, #02fd02 32%,
        #01c501 40%, #008e00 48%, #fdf802 56%, #e5bc00 64%, #fd9500 72%, #fd0000 80%,
        #d40000 86%, #bc0000 92%, #f800fd 100%); }
    .legend .scale { display: flex; justify-content: space-between; color: #8b98a5; }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="panel">
    <h1>NEXRAD Radar</h1>
    <div class="sub">Static page &middot; tiles pulled live from NOAA in your browser</div>
    <div class="row">
      <label for="product">Product</label>
      <select id="product">
        <option value="bref_qcd">Base Reflectivity</option>
        <option value="cref_qcd">Composite Reflectivity</option>
      </select>
    </div>
    <div class="row">
      <label for="opacity">Opacity</label>
      <input id="opacity" type="range" min="0" max="1" step="0.05" value="0.85" />
    </div>
    <div class="row">
      <label for="window">Loop window</label>
      <select id="window">
        <option value="60" selected>Last 1 hour</option>
        <option value="30">Last 30 min</option>
        <option value="120">Last 2 hours</option>
      </select>
    </div>
    <div class="row" style="display:block">
      <label>Jump to</label>
      <div class="jump">
        <button data-lat="39" data-lon="-98" data-z="4">CONUS</button>
        <button data-lat="63" data-lon="-152" data-z="4">Alaska</button>
        <button data-lat="20.6" data-lon="-157.5" data-z="7">Hawaii</button>
        <button data-lat="18.2" data-lon="-66.4" data-z="8">PR</button>
        <button data-lat="13.5" data-lon="144.8" data-z="8">Guam</button>
      </div>
    </div>
    <div class="status" id="status">Loading&hellip;</div>
  </div>

  <div class="player">
    <button class="play" id="play">&#10073;&#10073;</button>
    <div class="time">Frame <b id="frameLabel">--</b><br><span id="timeLabel">&mdash;</span></div>
    <input class="scrub" id="scrub" type="range" min="0" max="0" step="1" value="0" />
    <span class="live" id="liveBadge">live</span>
  </div>

  <div class="legend">
    <div>Reflectivity (dBZ)</div>
    <div class="bar"></div>
    <div class="scale"><span>5</span><span>25</span><span>45</span><span>65</span><span>75</span></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    // NOAA IDP GeoServer (government source). CORS is enabled (*), so the
    // browser can request these WMS tiles directly -- no backend required.
    const GEO = 'https://opengeo.ncep.noaa.gov/geoserver';
    const REGIONS = ['conus', 'alaska', 'hawaii', 'carib', 'guam'];

    const map = L.map('map', { worldCopyJump: true }).setView([39, -98], 4);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO', subdomains: 'abcd', maxZoom: 19
    }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd', maxZoom: 19, pane: 'shadowPane'
    }).addTo(map);

    const statusEl = document.getElementById('status');
    const scrub = document.getElementById('scrub');
    const playBtn = document.getElementById('play');
    const frameLabel = document.getElementById('frameLabel');
    const timeLabel = document.getElementById('timeLabel');
    const liveBadge = document.getElementById('liveBadge');

    let product = 'bref_qcd';
    let windowMin = 60;
    let userOpacity = 0.85;
    let frames = [];       // ISO strings oldest -> newest
    let frameLayers = [];  // array of arrays: [frame][region] = L.tileLayer.wms
    let current = 0, playing = true, timer = null;
    const FRAME_MS = 500, LAST_FRAME_MS = 1600;

    function wmsLayer(region, iso) {
      return L.tileLayer.wms(`${GEO}/${region}/ows?`, {
        layers: `${region}_${product}`,
        format: 'image/png', transparent: true, version: '1.3.0',
        crs: L.CRS.EPSG3857, tileSize: 256, opacity: 0,
        time: iso,
        attribution: 'Radar: NOAA/NWS NEXRAD'
      });
    }

    function clearLayers() {
      frameLayers.forEach(group => group.forEach(l => map.removeLayer(l)));
      frameLayers = [];
    }

    function buildLayers() {
      clearLayers();
      frameLayers = frames.map(iso => REGIONS.map(r => wmsLayer(r, iso).addTo(map)));
      scrub.max = Math.max(0, frames.length - 1);
    }

    function show(i) {
      if (!frameLayers.length) return;
      current = (i + frameLayers.length) % frameLayers.length;
      frameLayers.forEach((group, idx) =>
        group.forEach(l => l.setOpacity(idx === current ? userOpacity : 0)));
      scrub.value = current;
      const d = new Date(frames[current]);
      frameLabel.textContent = `${current + 1}/${frames.length}`;
      timeLabel.textContent = d.toLocaleString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      liveBadge.classList.toggle('on', current === frameLayers.length - 1);
    }

    function step() {
      if (!playing) return;
      const isLast = current === frameLayers.length - 1;
      show(isLast ? 0 : current + 1);
      timer = setTimeout(step, current === frameLayers.length - 1 ? LAST_FRAME_MS : FRAME_MS);
    }
    function play() { playing = true; playBtn.innerHTML = '&#10073;&#10073;'; clearTimeout(timer); step(); }
    function pause() { playing = false; playBtn.innerHTML = '&#9654;'; clearTimeout(timer); }

    // Parse the WMS TIME dimension from GetCapabilities (CORS-enabled). Falls
    // back to synthetic timestamps (the server snaps to the nearest scan).
    async function getFrames() {
      try {
        const url = `${GEO}/conus/conus_${product}/ows?service=WMS&version=1.3.0&request=GetCapabilities`;
        const xml = await (await fetch(url)).text();
        const m = xml.match(/<Dimension[^>]*name="time"[^>]*>([\s\S]*?)<\/Dimension>/i);
        if (m) {
          const all = m[1].split(',').map(s => s.trim()).filter(Boolean)
            .map(s => new Date(s)).filter(d => !isNaN(d)).sort((a, b) => a - b);
          const cutoff = all[all.length - 1] - windowMin * 60000;
          let win = all.filter(d => d >= cutoff);
          if (win.length > 13) {
            const step = (win.length - 1) / 12;
            win = Array.from({ length: 13 }, (_, i) => win[Math.round(i * step)]);
          }
          return win.map(d => d.toISOString().replace(/\.\d+Z$/, '.000Z'));
        }
      } catch (e) { /* fall through */ }
      const now = Date.now();
      return Array.from({ length: 13 }, (_, i) =>
        new Date(now - (windowMin * 60000) * (1 - i / 12)).toISOString().replace(/\.\d+Z$/, '.000Z'));
    }

    async function loadFrames() {
      statusEl.textContent = 'Loading frames\u2026';
      frames = await getFrames();
      if (!frames.length) { statusEl.textContent = 'No frames'; return; }
      buildLayers();
      show(frames.length - 1);
      statusEl.textContent = `${frames.length} frames \u00b7 last ${windowMin} min`;
      if (playing) play();
    }

    playBtn.addEventListener('click', () => (playing ? pause() : play()));
    scrub.addEventListener('input', () => { pause(); show(parseInt(scrub.value, 10)); });
    document.getElementById('product').addEventListener('change', e => { product = e.target.value; loadFrames(); });
    document.getElementById('window').addEventListener('change', e => { windowMin = parseInt(e.target.value, 10); loadFrames(); });
    document.getElementById('opacity').addEventListener('input', e => { userOpacity = parseFloat(e.target.value); show(current); });
    document.querySelectorAll('.jump button').forEach(b =>
      b.addEventListener('click', () => map.setView([+b.dataset.lat, +b.dataset.lon], +b.dataset.z)));
    setInterval(loadFrames, 120000);

    loadFrames();
  </script>
</body>
</html>
